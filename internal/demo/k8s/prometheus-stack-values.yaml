# kube-prometheus-stack Helm values for the temporal-worker-controller HPA demo.
#
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install prometheus prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f internal/demo/k8s/prometheus-stack-values.yaml
#
# This file configures:
#   1. ServiceMonitor — scrapes worker pod metrics (slot gauges) from port 9090
#   2. Temporal Cloud scrape config — scrapes temporal_cloud_v1_approximate_backlog_count
#      (Phase 2 only; requires a Temporal Cloud metrics API key)
#   3. Recording rules — slot utilization ratio (Phase 1 only)
#   4. prometheus-adapter — see internal/demo/k8s/prometheus-adapter-values.yaml

# ─── 1. ServiceMonitor ──────────────────────────────────────────────────────
#
# Applied separately to avoid chart version compatibility issues:
#   kubectl apply -f internal/demo/k8s/servicemonitor.yaml

# ─── 2. Temporal Cloud Scrape Config (Phase 2 only) ─────────────────────────
#
# Prerequisites:
#   kubectl create secret generic temporal-cloud-api-key \
#     -n monitoring \
#     --from-file=api-key=certs/metrics-api-key.txt
#
# The metrics API key is separate from the namespace API key. Create it at:
#   Cloud UI → Settings → Observability → Generate API Key

prometheus:
  prometheusSpec:
    secrets:
      - temporal-cloud-api-key
    additionalScrapeConfigs:
      - job_name: temporal_cloud
        scrape_interval: 60s
        scrape_timeout: 30s
        honor_timestamps: true
        scheme: https
        authorization:
          type: Bearer
          credentials_file: /etc/prometheus/secrets/temporal-cloud-api-key/api-key
        static_configs:
          - targets:
              - "metrics.temporal.io"
        metrics_path: /v1/metrics
        params:
          labels:
            - worker_version

# ─── 3. Recording Rules ─────────────────────────────────────────────────────

additionalPrometheusRulesMap:
  temporal-worker-scaling:
    groups:
      - name: temporal_worker_slots
        interval: 15s
        rules:
          # Slot utilization ratio per worker version, filtered to activity workers only.
          # Range: 0.0 (idle) to 1.0 (fully saturated).
          #
          # The worker emits twd_name and build_id as separate labels (both valid
          # Kubernetes label values), so no label_replace is needed here.
          - record: temporal_slot_utilization
            labels:
              task_queue: "default/helloworld"
              namespace: "default"
            expr: |
              sum by (twd_name, build_id) (
                temporal_worker_task_slots_used{
                  task_queue="default/helloworld",
                  worker_type="ActivityWorker"
                }
              )
              /
              clamp_min(
                sum by (twd_name, build_id) (
                  temporal_worker_task_slots_available{
                    task_queue="default/helloworld",
                    worker_type="ActivityWorker"
                  }
                ),
                1
              )

      - name: temporal_cloud_backlog
        interval: 60s
        rules:
          # Backlog count per worker version, with three k8s-compatible labels extracted
          # from Temporal Cloud's worker_version label ("{k8s-ns}_{twd-name}_{build-id}").
          #
          # k8s namespaces and TWD names follow DNS naming rules (no underscores), so _
          # is an unambiguous separator and label_replace is reliable.
          #
          # Why not use worker_version directly in HPA matchLabels?
          # The combined "{namespace}_{twd-name}_{build-id}" string frequently exceeds the
          # 63-char k8s label value limit: a survey of 50 production accounts showed combined
          # namespace+twd-name lengths of 15–64+ chars, leaving no room for the build ID.
          #
          # Extracted labels:
          #   namespace          — first segment of worker_version; routes the metric to the
          #                        correct k8s namespace in the External Metrics API
          #   twd_name           — middle segment; needed because build_id is only unique
          #                        within one TWD
          #   build_id           — last segment; ≤63 chars, always a valid k8s label value
          #   task_type          — preserved from source metric; filter in HPA matchLabels
          #   temporal_namespace — preserved from source metric; use in HPA matchLabels
          #                        to scope to a specific Temporal namespace
          - record: temporal_backlog_count_by_version
            expr: |
              label_replace(
                label_replace(
                  label_replace(
                    sum by (worker_version, task_type, temporal_namespace) (
                      temporal_cloud_v1_approximate_backlog_count
                    ),
                    "namespace", "$1", "worker_version", "^([^_]+)_.*"
                  ),
                  "twd_name", "$1", "worker_version", "^[^_]+_(.+)_[^_]+$"
                ),
                "build_id", "$1", "worker_version", ".*_([^_]+)$"
              )

