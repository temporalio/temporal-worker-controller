# WorkerResourceTemplate — per-version HPA scaling on slot utilization + backlog count (Phase 2)
#
# Extends wrt-hpa-slot-utilization.yaml by adding approximate_backlog_count from
# Temporal Cloud as a second scaling metric. Having both metrics means the HPA scales up
# when workers are busy (slot_utilization) AND when tasks are queued but not yet picked
# up (backlog_count). During a progressive rollout, each version's HPA responds
# independently: v2 scales up as its backlog grows; v1 scales down as its pinned
# workflows drain.
#
# Prerequisites (in addition to Phase 1 prerequisites):
#   1. Create the Temporal Cloud API key secret:
#        kubectl create secret generic temporal-cloud-metrics-token \
#          -n monitoring \
#          --from-file=api-key=certs/api-key.txt
#   2. Apply the updated prometheus-stack and adapter configs:
#        helm upgrade prometheus prometheus-community/kube-prometheus-stack \
#          -n monitoring -f internal/demo/k8s/prometheus-stack-values.yaml
#        helm upgrade prometheus-adapter prometheus-community/prometheus-adapter \
#          -n monitoring -f internal/demo/k8s/prometheus-adapter-values.yaml
#   3. Verify the backlog metric is flowing:
#        # Port-forward Prometheus and query: temporal_backlog_count_by_version
#
# Apply:
#   kubectl apply -f examples/wrt-hpa-backlog.yaml
#
# Watch the full demo:
#   make apply-hpa-load
#   # In another terminal: skaffold run --profile helloworld-worker (to deploy v2)
#   kubectl get hpa -w
#   # Observe v1 scaling down as its workflows drain; v2 scaling up as backlog grows
apiVersion: temporal.io/v1alpha1
kind: WorkerResourceTemplate
metadata:
  name: helloworld-hpa-backlog
  namespace: default
spec:
  temporalWorkerDeploymentRef:
    name: helloworld

  template:
    apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    spec:
      scaleTargetRef: {}
      minReplicas: 1
      maxReplicas: 15
      metrics:
#        # Metric 1: slot utilization — scale up when workers are busy.
#        - type: External
#          external:
#            metric:
#              name: temporal_slot_utilization
#              selector:
#                matchLabels:
#                  twd_name: "{{ .TWDName }}"
#                  build_id: "{{ .BuildID }}"
#            target:
#              type: AverageValue
#              averageValue: "400m"

        # Metric 2: backlog count — scale up when tasks are queued but not yet picked up.
        # The recording rule in prometheus-stack-values.yaml extracts twd_name and build_id
        # from Temporal Cloud's worker_version label. Both are needed: build_id is only
        # unique within a single TWD, not across all TWDs in a namespace.
        - type: External
          external:
            metric:
              name: temporal_backlog_count_by_version
              selector:
                matchLabels:
                  # twd_name and build_id are extracted from Temporal Cloud's worker_version
                  # label by the recording rule in prometheus-stack-values.yaml.
                  # build_id alone is not enough — it is only unique within one TWD.
                  twd_name: "{{ .TWDName }}"
                  build_id: "{{ .BuildID }}"
                  temporal_namespace: "{{ .TemporalNamespace }}"
                  task_type: "Activity"
            target:
              # Scale up if more than 5 tasks are queued per current replica.
              # Tune based on your workflow latency requirements.
              type: AverageValue
              averageValue: "5"
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
        scaleDown:
          # Longer window on scale-down so pinned v1 workflows finish draining
          # before replicas are removed.
          stabilizationWindowSeconds: 300
