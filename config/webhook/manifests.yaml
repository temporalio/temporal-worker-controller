---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: wrt-validating-webhook-configuration
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: webhook-service
        namespace: system
        path: /validate-temporal-io-v1alpha1-workerresourcetemplate
    failurePolicy: Fail
    name: vworkerresourcetemplate.kb.io
    rules:
      - apiGroups:
          - temporal.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
          - DELETE
        resources:
          - workerresourcetemplates
    sideEffects: None
