image:
  repository: temporalio/temporal-worker-controller
  tag: "" # Defaults to Chart.appVersion if not specified
  pullPolicy: IfNotPresent

podAnnotations: {}
  # Additional pod annotations can be added here
# example:
#   custom.annotation: value

podLabels: {}
  # Additional pod labels can be added here
  # example:
#   custom.label: value

# Configure the resources accordingly based on the project requirements.
# More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

terminationGracePeriodSeconds: 10

# All RBAC will be applied under this service account in
# the deployment namespace. You may disable creation of this resource
# if your manager will use a service account that exists at
# runtime. Be sure to update serviceAccount.name if changing
# service account names.
rbac:
  # Specifies whether RBAC resources should be created
  create: true

serviceAccount:
  # Specifies whether a ServiceAccount should be created
  create: true
  # The name of the ServiceAccount to use.
  # If not set and create is true, a name is generated.
  name:

# For common cases that do not require escalating privileges it is recommended to ensure that
#  all your Pods/Containers are restrictive.
# More info: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
# Please enable the following if your project does NOT have to work on old Kubernetes versions < 1.19
# or on vendors versions which do NOT support this field by default (i.e. Openshift < 4.11 ).
securityContext:
  seccompProfile:
    enabled: false

# Default podAntiAffinity uses preferredDuringSchedulingIgnoredDuringExecution to spread manager
# pods across nodes. For strict HA, switch to requiredDuringSchedulingIgnoredDuringExecution.
affinity: {}

# More than one replica is required for high availability.
replicas: 2

# Opt out of these resources if you want to disable the
# auth proxy (https://github.com/brancz/kube-rbac-proxy)
# which protects your /metrics endpoint.
authProxy:
  enabled: true

metrics:
  enabled: true
  port: 8080
  # Set to true if you want your controller-manager to expose the /metrics
  # endpoint w/o any authn/z. If false, creates an HTTP proxy sidecar container
  # for the controller manager which performs RBAC authorization against the
  # Kubernetes API using SubjectAccessReviews.
  disableAuth: false

namespace:
  create: false

webhook:
  # enabled controls the optional TemporalWorkerDeployment validating webhook.
  # The TemporalWorkerOwnedResource validating webhook is always enabled and does
  # not require this flag.
  enabled: false
  port: 9443
  certDir: /tmp/k8s-webhook-server/serving-certs

# Configuration for TemporalWorkerOwnedResource objects.
ownedResourceConfig:
  # bannedKinds is the list of Kubernetes resource kinds that are not permitted as
  # TemporalWorkerOwnedResource objects. The default list blocks workload types
  # (Deployment, StatefulSet, Job, Pod, CronJob) to prevent misuse of the mechanism
  # to run arbitrary services alongside the worker. Override this list if you have a
  # legitimate use case for one of these kinds.
  bannedKinds:
    - Deployment
    - StatefulSet
    - Job
    - Pod
    - CronJob

  # rbac controls which resource types the controller is permitted to manage on behalf
  # of TemporalWorkerOwnedResource objects (i.e. the HPAs, PDBs, or custom CRDs that
  # users attach to their versioned Deployments).
  #
  # The TemporalWorkerOwnedResource validating webhook enforces that requesting users
  # already have permission to manage the embedded resource type, so the controller's
  # permissions here act as the executor, not the gatekeeper.
  rbac:
    # wildcard: when true, grants the controller create/delete/get/patch/update on all
    # resource types in all API groups. Convenient for development clusters or when
    # users attach many different custom CRD types. Not recommended for production.
    wildcard: false

    # rules: explicit list of resource types the controller may manage. Each entry
    # follows standard RBAC rule syntax (apiGroups + resources). Ignored when
    # wildcard is true.
    #
    # Add one entry per API group your TWOR objects will use. For example, to support
    # KEDA ScaledObjects alongside the defaults, add:
    #   - apiGroups: ["keda.sh"]
    #     resources: ["scaledobjects"]
    rules:
      # HPA (autoscaling/v1 and autoscaling/v2 share the same API group)
      - apiGroups: ["autoscaling"]
        resources: ["horizontalpodautoscalers"]
      # PodDisruptionBudget
      - apiGroups: ["policy"]
        resources: ["poddisruptionbudgets"]

certmanager:
  # enabled controls creation of the cert-manager Issuer and Certificate used for
  # webhook TLS. cert-manager must be installed in the cluster.
  # See https://cert-manager.io/docs/installation/
  # Set to false only if you are providing your own TLS certificate in a Secret
  # named "webhook-server-cert" in the controller namespace.
  enabled: true

# Not yet supported
prometheus:
  enabled: false

nodeSelector: {}

tolerations: []
