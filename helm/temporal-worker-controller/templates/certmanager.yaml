{{- if .Values.certmanager.enabled }}
# Self-signed issuer and certificate for the webhook server TLS.
# Requires cert-manager to be installed in the cluster.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-selfsigned-issuer
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: certificate
    {{- include "temporal-worker-controller.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-serving-cert
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: certificate
    {{- include "temporal-worker-controller.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ .Release.Name }}-webhook-service.{{ .Release.Namespace }}.svc
    - {{ .Release.Name }}-webhook-service.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ .Release.Name }}-selfsigned-issuer
  secretName: webhook-server-cert
{{- end }}
